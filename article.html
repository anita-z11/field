<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Notes — Portfolio</title>

    <link
      href="https://api.fontshare.com/v2/css?f[]=archivo@400,401,700&f[]=clash-display@500,600&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chocolate+Classical+Sans&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="../../index.html" class="site-logo">Anita Zhang</a>
        <button
          data-theme-toggle
          aria-label="Switch to dark mode"
          class="theme-toggle"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </header>
    <article class="article-page">
      <a href="../../index.html" class="back-link">&larr; Back to portfolio</a>
      <h1 id="article-title">Loading...</h1>
      <p class="article-date" id="article-date"></p>
      <div id="markdown-content" class="article-body"></div>
    </article>

    <footer class="site-footer">
      <div class="container"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
      async function loadMarkdown() {
        const contentDiv = document.getElementById("markdown-content");

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get("id");

        if (!articleId) {
          contentDiv.innerHTML = "<p>No article specified.</p>";
          return;
        }
        try {
          const response = await fetch(`./content/${articleId}.md`);
          if (!response.ok) throw new Error("File not found");
          const text = await response.text();
          contentDiv.innerHTML = marked.parse(text);
          document.getElementById("article-title").innerText =
            articleId.replace(/-/g, " ");
        } catch (error) {
          contentDiv.innerHTML = "<p>Article not found or system error.</p>";
        }
      }
      loadMarkdown();
    </script>
  </body>
</html>
